name: Auto Update Sentinel Blueprints Manifest

on:
  push:
    paths:
      - 'AnalyticsRules/**'
      - 'AutomationRules/**'
      - 'Playbooks/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code with Push Authorization
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} 
          persist-credentials: true

      - name: Sync Folders to azuredeploy.json Manifest Arrays
        run: |
          echo " Scanning AnalyticsRules..."
          ANALYTICS_FILES=$(ls AnalyticsRules/*.json 2>/dev/null | grep -v "sentinel_onboarding.json" | xargs -n 1 basename || true)
          if [ -z "$ANALYTICS_FILES" ]; then ANALYTICS_JSON="[]"; else ANALYTICS_JSON=$(echo "$ANALYTICS_FILES" | jq -R . | jq -s -c .); fi
          
          echo " Scanning AutomationRules..."
          AUTOMATION_FILES=$(ls AutomationRules/*.json 2>/dev/null | xargs -n 1 basename || true)
          if [ -z "$AUTOMATION_FILES" ]; then AUTOMATION_JSON="[]"; else AUTOMATION_JSON=$(echo "$AUTOMATION_FILES" | jq -R . | jq -s -c .); fi
          
          echo " Scanning Playbooks..."
          PLAYBOOK_FILES=$(ls Playbooks/*.json 2>/dev/null | xargs -n 1 basename || true)
          if [ -z "$PLAYBOOK_FILES" ]; then PLAYBOOK_JSON="[]"; else PLAYBOOK_JSON=$(echo "$PLAYBOOK_FILES" | jq -R . | jq -s -c .); fi
          
          echo " Analytics Rules: $ANALYTICS_JSON"
          echo " Automation Rules: $AUTOMATION_JSON"
          echo " Playbooks Found: $PLAYBOOK_JSON"
          
          jq --argjson alist "$ANALYTICS_JSON" --argjson olist "$AUTOMATION_JSON" --argjson plist "$PLAYBOOK_JSON" \
            '.parameters.analyticsRuleFiles.defaultValue = $alist | .parameters.automationRuleFiles.defaultValue = $olist | .parameters.playbookFiles.defaultValue = $plist' \
            azuredeploy.json > temp.json && mv temp.json azuredeploy.json

      - name: Commit and Push Manifest Synchronization Changes
        run: |
          git config --global user.name "Github Actions Robot"
          git config --global user.email "actions@github.com"
          git add azuredeploy.json
          if git diff-index --quiet HEAD --; then
            echo " All manifest profiles are perfectly in sync."
          else
            git commit -m "automation: dynamically tracked new analytics, automation, and playbook structures"
            git push origin HEAD:${{ github.ref }} 
          fi
